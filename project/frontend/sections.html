<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden Sections · Campus Gardening Management System</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-shell">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="fa-solid fa-seedling"></i></div>
        <div>
          <span class="brand-title">Campus Garden</span>
          <span class="brand-subtitle">Management System</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
        <a href="plants.html" class="nav-item"><i class="fa-solid fa-leaf"></i><span>Plants Catalog</span></a>
        <a href="sections.html" class="nav-item active"><i class="fa-solid fa-map-location-dot"></i><span>Garden Sections</span></a>
        <a href="staff.html" class="nav-item"><i class="fa-solid fa-users"></i><span>Staff Directory</span></a>
        <a href="maintenance.html" class="nav-item"><i class="fa-solid fa-list-check"></i><span>Maintenance Tasks</span></a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar" id="sidebar-avatar">G</div>
          <div class="user-info">
            <div class="user-name" id="topbar-user-name">Gardener</div>
            <div class="user-role" id="topbar-user-role">Head Supervisor</div>
          </div>
          <button class="btn-logout" id="logout-btn" title="Log Out"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
      </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
      
      <!-- Topbar Header -->
      <header class="topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
        <div class="page-title">
          <h1>Garden Sections</h1>
          <p>Manage campus garden zones, area sizes, and irrigation setups.</p>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary" id="btn-add-section"><i class="fa-solid fa-plus"></i> Add Garden Section</button>
        </div>
      </header>

      <!-- Content Body -->
      <main class="content-body">
        
        <!-- Cards Grid -->
        <div class="cards-grid" id="sections-grid">
          <!-- Populated dynamically by JS -->
        </div>

      </main>

    </div>

  </div>

  <!-- Add Section Modal -->
  <div class="modal-backdrop" id="section-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">Add New Garden Section</h3>
        <button class="modal-close" id="section-modal-close">&times;</button>
      </div>
      <form id="section-form">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="sec-name">Section Name</label>
            <input type="text" id="sec-name" class="form-control" placeholder="e.g. Tropical Greenhouse" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="sec-area">Area Size</label>
            <input type="text" id="sec-area" class="form-control" placeholder="e.g. 500 sq ft" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="sec-head">Head Supervisor / Staff</label>
            <select id="sec-head" class="form-select" required>
              <!-- Dynamic options -->
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="sec-irrigation">Irrigation System</label>
            <select id="sec-irrigation" class="form-select" required>
              <option value="Drip System">Drip System</option>
              <option value="Sprinkler">Sprinkler</option>
              <option value="Manual Watering">Manual Watering</option>
              <option value="Flood / Drip">Flood / Drip</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="section-modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Section</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/sections.js"></script>
</body>
</html>
