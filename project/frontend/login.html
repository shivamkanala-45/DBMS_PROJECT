<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Campus Gardening Management System</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: radial-gradient(circle at 20% 20%, #065f46 0%, #064e3b 50%, #022c22 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glowing background circles */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
    }
    body::before {
      width: 320px;
      height: 320px;
      background: rgba(16, 185, 129, 0.25);
      top: 10%;
      left: 15%;
    }
    body::after {
      width: 400px;
      height: 400px;
      background: rgba(2, 132, 199, 0.2);
      bottom: 10%;
      right: 15%;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
      width: 100%;
      max-width: 440px;
      padding: 40px 36px;
      z-index: 10;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.3);
      animation: fadeInUp 0.4s ease-out;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-brand .brand-icon {
      margin: 0 auto 14px;
      width: 60px;
      height: 60px;
      font-size: 28px;
      border-radius: var(--radius-md);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
    }

    .login-brand h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .login-brand p {
      font-size: 0.88rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .demo-hint {
      background: var(--primary-light);
      border-left: 4px solid var(--primary);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      color: #047857;
      margin-top: 24px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon"><i class="fa-solid fa-seedling"></i></div>
      <h1>Campus Garden</h1>
      <p>Management System Portal</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" class="form-control" value="admin" required placeholder="Enter username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" value="admin123" required placeholder="Enter password">
      </div>

      <div class="form-group">
        <label class="form-label" for="user-role">Role</label>
        <select id="user-role" class="form-select">
          <option value="Head Supervisor">Head Supervisor</option>
          <option value="Horticulturist">Horticulturist</option>
          <option value="Gardener">Gardener</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 14px; padding: 13px;">
        Sign In to Portal <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="demo-hint">
        <i class="fa-solid fa-circle-info"></i> <strong>Demo Sign-In:</strong> Click <em>Sign In</em> to enter the dashboard.
      </div>
    </form>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
